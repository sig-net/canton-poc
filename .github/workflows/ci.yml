name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: client

jobs:
  ci:
    name: Check & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Daml SDK
        uses: actions/cache@v4
        with:
          path: ~/.dpm
          key: dpm-3.4.11

      - name: Install Daml SDK
        working-directory: .
        run: |
          if [ ! -f "$HOME/.dpm/bin/dpm" ]; then
            curl -sSL https://get.digitalasset.com/install/install.sh | sh
          fi

      - name: Build DAR, run Daml tests & generate codegen
        working-directory: .
        run: |
          export PATH="$HOME/.dpm/bin:$PATH"
          dpm build
          dpm test
          dpm codegen-js .daml/dist/canton-mpc-poc-0.0.1.dar -o client/generated/model -s daml.js

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - name: Generate OpenAPI types
        run: pnpx openapi-typescript openapi.yaml -o generated/api/ledger-api.ts

      - run: pnpm install --frozen-lockfile

      - run: pnpm check

      - name: Start Canton sandbox
        working-directory: .
        run: |
          export PATH="$HOME/.dpm/bin:$PATH"
          dpm sandbox --json-api-port 7575 --dar .daml/dist/canton-mpc-poc-0.0.1.dar &

      - name: Wait for Canton JSON API
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:7575/docs/openapi > /dev/null 2>&1; then
              echo "Canton sandbox is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Canton sandbox failed to start within 120s"
          exit 1

      - run: pnpm test
