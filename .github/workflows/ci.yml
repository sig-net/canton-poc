name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Check & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Cache Daml SDK
        uses: actions/cache@v4
        with:
          path: ~/.dpm
          key: dpm-${{ hashFiles('daml.yaml') }}

      - name: Install Daml SDK
        run: |
          if [ ! -f "$HOME/.dpm/bin/dpm" ]; then
            curl -sSL https://get.digitalasset.com/install/install.sh | sh
          fi
          echo "$HOME/.dpm/bin" >> "$GITHUB_PATH"

      - name: Build DAR, run Daml tests & generate codegen
        run: |
          dpm build
          dpm test
          dpm codegen-js .daml/dist/canton-mpc-poc-0.0.1.dar -o packages/canton-mpc/generated/model -s daml.js

      - run: pnpm install --frozen-lockfile

      - name: Start Canton sandbox
        run: dpm sandbox --json-api-port 7575 --dar .daml/dist/canton-mpc-poc-0.0.1.dar &

      - name: Wait for Canton JSON API
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:7575/docs/openapi > /dev/null 2>&1; then
              echo "Canton sandbox is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Canton sandbox failed to start within 120s"
          exit 1

      - name: Generate OpenAPI types
        working-directory: test
        run: |
          curl -sf http://localhost:7575/docs/openapi -o openapi.yaml
          pnpm exec openapi-typescript openapi.yaml -o ../packages/canton-mpc/generated/api/ledger-api.ts

      - name: Build library
        working-directory: packages/canton-mpc
        run: pnpm build

      - name: Check
        run: pnpm check

      - name: Test
        working-directory: test
        run: pnpm test
